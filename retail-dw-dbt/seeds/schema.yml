version: 2

seeds:
  - name: raw_customers
    description: Raw customer records as exported from the operational DB.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null

  - name: raw_products
    description: Raw product catalog.
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: raw_sales
    description: Raw sales transactions.
    columns:
      - name: sale_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('raw_customers')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('raw_products')
              field: product_id
