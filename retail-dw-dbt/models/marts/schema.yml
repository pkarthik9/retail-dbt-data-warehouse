version: 2

models:
  - name: dim_customer
    description: One row per customer, with derived recency attributes.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: dim_product
    description: One row per product, with a derived price tier.
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: fact_sales
    description: Sale-grain fact table, one row per transaction.
    columns:
      - name: sale_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: line_total
        tests:
          - not_null

  - name: mart_monthly_revenue
    description: Monthly revenue rolled up by category and channel - feeds the BI dashboard.

  - name: mart_customer_ltv
    description: Lifetime value per customer - feeds the BI dashboard.
